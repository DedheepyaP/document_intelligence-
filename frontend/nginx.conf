server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy 
    # All requests to /api/ are forwarded to the FastAPI container.
    # This removes the need for CORS in production since everything
    # appears to come from the same origin (port 80).
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Support large file uploads (matches MAX_UPLOAD_SIZE_MB)
        client_max_body_size 25m;
        proxy_read_timeout   120s;
    }

    # React SPA fallback
    # Any route that is not a real file falls back to index.html so that
    # React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
